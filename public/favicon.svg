<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1a1510"/>

  <!-- Cat ears -->
  <polygon points="10,22 18,6 24,22" fill="#e09f7d"/>
  <polygon points="40,22 46,6 54,22" fill="#e09f7d"/>
  <!-- Inner ear -->
  <polygon points="12,21 18,9 23,21" fill="#ffb7b2"/>
  <polygon points="41,21 46,9 52,21" fill="#ffb7b2"/>

  <!-- Cat head -->
  <ellipse cx="32" cy="36" rx="22" ry="20" fill="#e09f7d"/>

  <!-- Forehead fur gradient -->
  <ellipse cx="32" cy="22" rx="18" ry="8" fill="#eccdc0"/>

  <!-- Eyes -->
  <ellipse cx="23" cy="33" rx="4" ry="5" fill="#1a1510"/>
  <ellipse cx="41" cy="33" rx="4" ry="5" fill="#1a1510"/>
  <!-- Eye shine -->
  <circle cx="25" cy="31" r="1.5" fill="white"/>
  <circle cx="43" cy="31" r="1.5" fill="white"/>

  <!-- Nose -->
  <ellipse cx="32" cy="40" rx="3" ry="2" fill="#ffb7b2"/>

  <!-- Mouth -->
  <path d="M29 42 Q32 45 35 42" stroke="#3e2723" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Whiskers left -->
  <line x1="8" y1="38" x2="26" y2="40" stroke="#fcf4ec" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="8" y1="42" x2="26" y2="42" stroke="#fcf4ec" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

  <!-- Whiskers right -->
  <line x1="56" y1="38" x2="38" y2="40" stroke="#fcf4ec" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="56" y1="42" x2="38" y2="42" stroke="#fcf4ec" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
</svg>
